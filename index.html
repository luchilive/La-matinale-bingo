<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Matinale Bingo</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f7efe8;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    color:#d97b2b;
    margin-bottom:20px;
}

#setup{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    max-width:900px;
    margin:auto;
}

#setup input{
    height:60px;
    text-align:center;
    font-size:14px;
}

button{
    padding:12px 24px;
    margin-top:20px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#d97b2b;
    color:white;
}

#bingo{
    display:none;
    max-width:900px;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;
}

.case{
    border:2px solid #d97b2b;
    min-height:100px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:10px;
    background:white;
    cursor:pointer;
    font-weight:bold;
}

.case.checked{
    background:#ffce8a;
}
</style>
</head>

<body>

<h1>☕ La Matinale Bingo 🎯</h1>

<div id="setup"></div>

<button onclick="startBingo()">Let's Go !</button>

<div id="bingo"></div>

<script>

const setup = document.getElementById("setup");

for(let i=0;i<16;i++){
    const input=document.createElement("input");
    input.placeholder="Case "+(i+1);
    setup.appendChild(input);
}

function startBingo(){

    const inputs=document.querySelectorAll("#setup input");
    const bingo=document.getElementById("bingo");

    bingo.innerHTML="";
    bingo.style.display="grid";

    inputs.forEach(input=>{

        const div=document.createElement("div");
        div.className="case";
        div.innerText=input.value || "???";

        div.onclick=()=>{
            div.classList.toggle("checked");
        }

        bingo.appendChild(div);
    });

    document.getElementById("setup").style.display="none";
}

</script>

</body>
</html>
